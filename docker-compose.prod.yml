services:
  calendate:
    image: ghcr.io/minigiolabs/calendate:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-CHANGE_ME}
      - BASE_URL=https://calendate.link
      - DATABASE_PATH=/data/calendate.db
    volumes:
      - calendate_data:/data
    healthcheck:
      test: ["CMD-SHELL", "uv run python -c \"import urllib.request; print(urllib.request.urlopen('http://localhost:8000/').status)\""]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  calendate_data:
