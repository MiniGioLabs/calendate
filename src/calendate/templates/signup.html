{% extends "base.html" %}
{% block title %}Sign up — CalDate{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto">
    <h1 class="text-2xl font-bold mb-6">Create your account</h1>
    {% if error %}<p class="text-red-500 text-sm mb-4">{{ error }}</p>{% endif %}
    <form method="POST" class="space-y-4">
        <input type="text" name="name" required maxlength="40" placeholder="Full name" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand outline-none">
        <input type="tel" name="phone" required pattern="[\d\s\(\)\-\.\+]{10,}" placeholder="555-123-4567" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand outline-none">
        <input type="password" name="password" required minlength="6" maxlength="128" placeholder="Password (6+ chars)" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand outline-none">
        <button type="submit" class="w-full bg-brand text-white py-3 rounded-xl font-medium hover:bg-brand-dark">Sign up</button>
    </form>
    <p class="text-sm text-gray-500 mt-4 text-center">Have an account? <a href="/login" class="text-brand">Log in</a></p>
</div>
{% endblock %}
