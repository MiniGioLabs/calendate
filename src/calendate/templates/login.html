{% extends "base.html" %}
{% block title %}Log in — CalDate{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto">
    <h1 class="text-2xl font-bold mb-6">Welcome back</h1>
    {% if error %}<p class="text-red-500 text-sm mb-4">{{ error }}</p>{% endif %}
    <form method="POST" class="space-y-4">
        <input type="tel" name="phone" required placeholder="Phone" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand outline-none">
        <input type="password" name="password" required placeholder="Password" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand outline-none">
        <button type="submit" class="w-full bg-brand text-white py-3 rounded-xl font-medium hover:bg-brand-dark">Log in</button>
    </form>
    <p class="text-sm text-gray-500 mt-4 text-center">No account? <a href="/signup" class="text-brand">Sign up</a></p>
</div>
{% endblock %}
